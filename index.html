<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <meta name="description" content="" id="meta-description" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/main.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
      "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.15.0/index.js",
      "gsap/ScrollTrigger": "https://cdn.jsdelivr.net/npm/gsap@3.15.0/ScrollTrigger.js",
      "gsap/ScrollToPlugin": "https://cdn.jsdelivr.net/npm/gsap@3.15.0/ScrollToPlugin.js"
    }
  }
  </script>
</head>
<body>

  <div id="loader" aria-hidden="true"><span>initializing workspace<i>…</i></span></div>
  <div id="webgl" aria-hidden="true"></div>

  <div class="layer" id="os-desktop" aria-hidden="true">
    <div class="os-wallpaper">
      <div class="os-wallpaper-track"></div>
    </div>
    <div class="os-topbar">
      <span class="os-brand" id="os-brand"></span>
      <span class="os-path" id="os-path"></span>
      <span id="os-location"></span>
    </div>
    <div class="folder-grid">
      <div class="folder" id="folder-about">
        <div class="folder-icon"><span class="folder-gold"></span></div>
        <p>about-me/</p>
      </div>
      <div class="folder" id="folder-projects">
        <div class="folder-icon"><span class="folder-gold"></span></div>
        <p>projects/</p>
      </div>
      <div class="folder" id="folder-contact">
        <div class="folder-icon"><span class="folder-gold"></span></div>
        <p>contact/</p>
      </div>
    </div>
  </div>

  <header class="nav" id="site-nav">
    <a class="monogram" id="nav-monogram" data-scene="top" role="button" tabindex="0"></a>
    <nav aria-label="Main">
      <a data-scene="work" role="button" tabindex="0">Work</a>
      <a data-scene="about" role="button" tabindex="0">About</a>
      <a data-scene="contact" role="button" tabindex="0">Contact</a>
      <a data-scene="contact" role="button" tabindex="0" class="btn-gold nav-cta" id="nav-cta"></a>
    </nav>
  </header>

  <div class="layer" id="layer-intro">
    <div class="inner intro-inner">
      <p class="intro-eyebrow" id="intro-location"></p>
      <h1 id="intro-name"></h1>
      <p class="intro-role" id="intro-title"></p>
      <p class="intro-hint"><span id="intro-hint"></span><span class="chev">▾</span></p>
    </div>
  </div>

  <section class="layer" id="about" aria-label="About">
    <div class="inner window window--about">
      <div class="window-bar"><i></i><i></i><i></i><span id="about-path"></span></div>
      <div class="window-body about-grid">
        <div class="photo-wrap">
          <img id="me-photo" data-src="" alt="" width="240" />
        </div>
        <div class="about-text">
          <h2 id="about-heading"></h2>
          <p id="about-bio"></p>
          <ul class="badges" id="about-badges"></ul>
        </div>
      </div>
    </div>
  </section>

  <section class="layer" id="work" aria-label="Projects">
    <div class="inner window window--projects">
      <div class="window-bar"><i></i><i></i><i></i><span id="projects-path"></span></div>
      <div class="window-body" id="projects-body"></div>
    </div>
  </section>

  <section class="layer" id="contact" aria-label="Contact">
    <div class="inner window window--terminal">
      <div class="window-bar"><i></i><i></i><i></i><span id="contact-path"></span></div>
      <div class="window-body">
        <pre class="terminal" id="terminal-output" aria-live="polite"></pre>
        <div class="ctas" id="contact-ctas">
          <a class="btn-gold" id="contact-email" href="#"></a>
          <a class="btn-outline" id="contact-phone" href="#"></a>
        </div>
        <p class="footer-line" id="contact-footer"></p>
      </div>
    </div>
  </section>

  <div id="scroll-track" aria-hidden="true"></div>

  <script src="js/store.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
